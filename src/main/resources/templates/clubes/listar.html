<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Clubes • Fútbol Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div th:replace="fragments/layout :: navbar"></div>

  <main class="container app-main">
    <div class="app-page-header">
      <div>
        <span class="badge-pill">Clubs</span>
        <h1 class="app-page-title"><i class="bi bi-shield-fill me-2"></i>Clubes</h1>
        <p class="app-page-subtitle">Gestiona los clubes con un estilo institucional y visual premium.</p>
      </div>
      <button id="btnAddClub" class="btn btn-primary btn-lg"><i class="bi bi-plus-lg"></i> Nuevo club</button>
    </div>

    <div id="alertContainer"></div>

    <section class="section-panel">
      <div class="card-group-grid" id="club-grid"></div>
    </section>

    <div class="footer-cta">
      <a href="/" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
    </div>
  </main>

  <div class="modal fade" id="clubModal" tabindex="-1" aria-labelledby="clubModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="clubForm">
          <div class="modal-header">
            <h5 class="modal-title" id="clubModalLabel">Nuevo club</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="clubId">
            <div class="mb-3">
              <label for="clubNombre" class="form-label">Nombre</label>
              <input type="text" id="clubNombre" class="form-control" placeholder="Real Madrid" required>
            </div>
            <div class="mb-3">
              <label for="clubCiudad" class="form-label">Ciudad</label>
              <input type="text" id="clubCiudad" class="form-control" placeholder="Madrid" required>
            </div>
            <div class="mb-3">
              <label for="clubFundacion" class="form-label">Fundación</label>
              <input type="number" id="clubFundacion" class="form-control" placeholder="1902" required min="1800" max="2100">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div th:replace="fragments/layout :: footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const clubModal = new bootstrap.Modal(document.getElementById('clubModal'));
    const clubForm = document.getElementById('clubForm');
    const clubGrid = document.getElementById('club-grid');
    const alertContainer = document.getElementById('alertContainer');
    const btnAddClub = document.getElementById('btnAddClub');

    document.addEventListener('DOMContentLoaded', () => {
      loadClubs();
      btnAddClub.addEventListener('click', () => openClubModal());
      clubForm.addEventListener('submit', saveClub);
    });

    async function loadClubs() {
      try {
        const response = await fetch('/api/clubes');
        const clubs = await response.json();
        renderClubs(clubs);
      } catch (error) {
        showAlert('Error al cargar clubes. ' + error.message, 'danger');
      }
    }

    function renderClubs(clubs) {
      clubGrid.innerHTML = '';
      if (!Array.isArray(clubs) || clubs.length === 0) {
        clubGrid.innerHTML = `
          <article class="item-card text-center">
            <div class="card-body">
              <h3>No hay clubes registrados</h3>
              <p>Empieza creando tu primer club para ver la tarjeta aquí.</p>
            </div>
          </article>
        `;
        return;
      }

      clubs.forEach((club, index) => {
        const card = document.createElement('article');
        card.className = 'item-card';
        const initials = club.nombre ? club.nombre.charAt(0).toUpperCase() : 'C';
        card.innerHTML = `
          <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="avatar">${initials}</div>
            <span class="badge-pill">Club ${index + 1}</span>
          </div>
          <h3>${club.nombre || 'N/A'}</h3>
          <div class="meta">
            <span><strong>Ciudad:</strong> ${club.ciudad || 'N/A'}</span>
            <span><strong>Fundación:</strong> ${club.fundacion || '-'}</span>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-sm btn-outline-light" aria-label="Editar club">Editar</button>
            <button type="button" class="btn btn-sm btn-outline-danger" aria-label="Eliminar club">Eliminar</button>
          </div>
        `;
        const buttons = card.querySelectorAll('button');
        buttons[0].addEventListener('click', () => openClubModal(club));
        buttons[1].addEventListener('click', () => deleteClub(club.id));
        clubGrid.appendChild(card);
      });
    }

    function openClubModal(club = null) {
      document.getElementById('clubId').value = club ? club.id : '';
      document.getElementById('clubNombre').value = club ? club.nombre : '';
      document.getElementById('clubCiudad').value = club ? club.ciudad : '';
      document.getElementById('clubFundacion').value = club ? club.fundacion : '';
      document.getElementById('clubModalLabel').textContent = club ? 'Editar club' : 'Nuevo club';
      clubModal.show();
    }

    async function saveClub(event) {
      event.preventDefault();
      const id = document.getElementById('clubId').value;
      const payload = {
        nombre: document.getElementById('clubNombre').value.trim(),
        ciudad: document.getElementById('clubCiudad').value.trim(),
        fundacion: Number(document.getElementById('clubFundacion').value)
      };

      try {
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/clubes/${id}` : '/api/clubes';
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error('No se pudo guardar el club');
        }
        showAlert(`Club ${id ? 'actualizado' : 'creado'} correctamente.`);
        clubModal.hide();
        loadClubs();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    async function deleteClub(id) {
      if (!confirm('¿Seguro que quieres eliminar este club?')) return;
      try {
        const response = await fetch(`/api/clubes/${id}`, { method: 'DELETE' });
        if (!response.ok) {
          throw new Error('No se pudo eliminar el club');
        }
        showAlert('Club eliminado correctamente.', 'warning');
        loadClubs();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    function showAlert(message, type = 'success') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
      `;
    }
  </script>
</body>
</html>
