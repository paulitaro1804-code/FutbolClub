<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fútbol Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-theme">

  <!-- FRAGMENTO: NAVBAR -->
  <nav th:fragment="navbar" class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Fútbol Club</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="/clubes"><i class="bi bi-shield-fill me-2"></i> Clubes</a></li>
          <li class="nav-item"><a class="nav-link" href="/equipos"><i class="bi bi-people-fill me-2"></i> Equipos</a></li>
          <li class="nav-item"><a class="nav-link" href="/jugadores"><i class="bi bi-person-badge-fill me-2"></i> Jugadores</a></li>
          <li class="nav-item"><a class="nav-link" href="/partidos"><i class="bi bi-trophy-fill me-2"></i> Partidos</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- FRAGMENTO: FOOTER -->
  <footer th:fragment="footer" class="app-footer">
    <div class="container">
      <div class="row align-items-center gy-3">
        <div class="col-md-6 text-center text-md-start">
          <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> Fútbol Club</span>
        </div>
        <div class="col-md-6 text-center text-md-end">
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Mark the current page's nav link as active
    (function () {
      const path = window.location.pathname;
      document.querySelectorAll('.app-navbar .nav-link').forEach(function (link) {
        const href = link.getAttribute('href');
        if (href && href !== '/' && path.startsWith(href)) {
          link.classList.add('active');
        }
      });
    })();
  </script>
</body>
</html>
