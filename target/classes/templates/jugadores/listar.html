<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Jugadores • Fútbol Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div th:replace="fragments/layout :: navbar"></div>

  <main class="container app-main">
    <div class="app-page-header">
      <div>
        <span class="badge-pill">Jugadores</span>
        <h1 class="app-page-title"><i class="bi bi-person-badge-fill me-2"></i>Jugadores</h1>
        <p class="app-page-subtitle">Gestiona la plantilla completa con cartas de jugador y datos clave visibles al instante.</p>
      </div>
      <button id="btnAddJugador" class="btn btn-primary btn-lg"><i class="bi bi-plus-lg"></i> Nuevo jugador</button>
    </div>

    <div id="alertContainer"></div>

    <section class="section-panel">
      <div class="card-group-grid" id="jugador-grid"></div>
    </section>

    <div class="footer-cta">
      <a href="/" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
    </div>
  </main>

  <div class="modal fade" id="jugadorModal" tabindex="-1" aria-labelledby="jugadorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="jugadorForm">
          <div class="modal-header">
            <h5 class="modal-title" id="jugadorModalLabel">Nuevo jugador</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="jugadorId">
            <div class="mb-3">
              <label for="jugadorNombre" class="form-label">Nombre</label>
              <input type="text" id="jugadorNombre" class="form-control" placeholder="Cristiano Ronaldo" required>
            </div>
            <div class="mb-3">
              <label for="jugadorDorsal" class="form-label">Dorsal</label>
              <input type="number" id="jugadorDorsal" class="form-control" placeholder="7" required min="1" max="99">
            </div>
            <div class="mb-3">
              <label for="jugadorPosicion" class="form-label">Posición</label>
              <input type="text" id="jugadorPosicion" class="form-control" placeholder="Delantero" required>
            </div>
            <div class="mb-3">
              <label for="jugadorEquipo" class="form-label">Equipo</label>
              <select id="jugadorEquipo" class="form-select" required>
                <option value="">Selecciona un equipo</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div th:replace="fragments/layout :: footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const jugadorModal = new bootstrap.Modal(document.getElementById('jugadorModal'));
    const jugadorForm = document.getElementById('jugadorForm');
    const jugadorGrid = document.getElementById('jugador-grid');
    const selectEquipo = document.getElementById('jugadorEquipo');
    const alertContainer = document.getElementById('alertContainer');
    const btnAddJugador = document.getElementById('btnAddJugador');

    document.addEventListener('DOMContentLoaded', () => {
      loadEquipos();
      loadJugadores();
      btnAddJugador.addEventListener('click', () => openJugadorModal());
      jugadorForm.addEventListener('submit', saveJugador);
    });

    async function loadEquipos() {
      try {
        const response = await fetch('/api/equipos');
        const equipos = await response.json();
        selectEquipo.innerHTML = '<option value="">Selecciona un equipo</option>';
        equipos.forEach(equipo => {
          const option = document.createElement('option');
          option.value = equipo.id;
          option.textContent = equipo.nombre;
          selectEquipo.appendChild(option);
        });
      } catch (error) {
        showAlert('Error al cargar equipos. ' + error.message, 'danger');
      }
    }

    async function loadJugadores() {
      try {
        const response = await fetch('/api/jugadores');
        const jugadores = await response.json();
        renderJugadores(jugadores);
      } catch (error) {
        showAlert('Error al cargar jugadores. ' + error.message, 'danger');
      }
    }

    function renderJugadores(jugadores) {
      jugadorGrid.innerHTML = '';
      if (!Array.isArray(jugadores) || jugadores.length === 0) {
        jugadorGrid.innerHTML = `
          <article class="item-card text-center">
            <div class="card-body">
              <h3>No hay jugadores registrados</h3>
              <p>Añade jugadores para completar la plantilla del club.</p>
            </div>
          </article>
        `;
        return;
      }

      jugadores.forEach((jugador, index) => {
        const card = document.createElement('article');
        card.className = 'item-card';
        const initials = jugador.nombre ? jugador.nombre.charAt(0).toUpperCase() : 'J';
        card.innerHTML = `
          <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="avatar">${initials}</div>
            <span class="badge-pill">#${jugador.dorsal || index + 1}</span>
          </div>
          <h3>${jugador.nombre || 'N/A'}</h3>
          <div class="meta">
            <span><strong>Posición:</strong> <span class="pos-badge pos-${(jugador.posicion || '').toLowerCase().replace(/[^\w]/g, '-')}">${jugador.posicion || 'Sin posición'}</span></span>
            <span><strong>Equipo:</strong> ${jugador.equipo?.nombre || 'Sin equipo'}</span>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-sm btn-outline-light">Editar</button>
            <button type="button" class="btn btn-sm btn-outline-danger">Eliminar</button>
          </div>
        `;
        const buttons = card.querySelectorAll('button');
        buttons[0].addEventListener('click', () => openJugadorModal(jugador));
        buttons[1].addEventListener('click', () => deleteJugador(jugador.id));
        jugadorGrid.appendChild(card);
      });
    }

    function openJugadorModal(jugador = null) {
      document.getElementById('jugadorId').value = jugador ? jugador.id : '';
      document.getElementById('jugadorNombre').value = jugador ? jugador.nombre : '';
      document.getElementById('jugadorDorsal').value = jugador ? jugador.dorsal : '';
      document.getElementById('jugadorPosicion').value = jugador ? jugador.posicion : '';
      document.getElementById('jugadorEquipo').value = jugador?.equipo?.id || '';
      document.getElementById('jugadorModalLabel').textContent = jugador ? 'Editar jugador' : 'Nuevo jugador';
      jugadorModal.show();
    }

    async function saveJugador(event) {
      event.preventDefault();
      const id = document.getElementById('jugadorId').value;
      const payload = {
        nombre: document.getElementById('jugadorNombre').value.trim(),
        dorsal: Number(document.getElementById('jugadorDorsal').value),
        posicion: document.getElementById('jugadorPosicion').value.trim(),
        equipoId: document.getElementById('jugadorEquipo').value
      };

      try {
        const response = await fetch(id ? `/api/jugadores/${id}` : '/api/jugadores', {
          method: id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error('No se pudo guardar el jugador');
        }
        showAlert(`Jugador ${id ? 'actualizado' : 'creado'} correctamente.`);
        jugadorModal.hide();
        loadJugadores();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    async function deleteJugador(id) {
      if (!confirm('¿Seguro que quieres eliminar este jugador?')) return;
      try {
        const response = await fetch(`/api/jugadores/${id}`, { method: 'DELETE' });
        if (!response.ok) {
          throw new Error('No se pudo eliminar el jugador');
        }
        showAlert('Jugador eliminado correctamente.', 'warning');
        loadJugadores();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    function showAlert(message, type = 'success') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
      `;
    }
  </script>
</body>
</html>
