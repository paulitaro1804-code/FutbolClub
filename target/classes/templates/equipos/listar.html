<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Equipos • Fútbol Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div th:replace="fragments/layout :: navbar"></div>

  <main class="container app-main">
    <div class="app-page-header">
      <div>
        <span class="badge-pill">Equipos</span>
        <h1 class="app-page-title"><i class="bi bi-people-fill me-2"></i>Equipos</h1>
        <p class="app-page-subtitle">Mira cada alineación, categoría y club en un formato visual de tarjetas.</p>
      </div>
      <button id="btnAddEquipo" class="btn btn-primary btn-lg"><i class="bi bi-plus-lg"></i> Nuevo equipo</button>
    </div>

    <div id="alertContainer"></div>

    <section class="section-panel">
      <div class="card-group-grid" id="equipo-grid"></div>
    </section>

    <div class="footer-cta">
      <a href="/" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
    </div>
  </main>

  <div class="modal fade" id="equipoModal" tabindex="-1" aria-labelledby="equipoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="equipoForm">
          <div class="modal-header">
            <h5 class="modal-title" id="equipoModalLabel">Nuevo equipo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="equipoId">
            <div class="mb-3">
              <label for="equipoNombre" class="form-label">Nombre</label>
              <input type="text" id="equipoNombre" class="form-control" placeholder="Real Madrid A" required>
            </div>
            <div class="mb-3">
              <label for="equipoCategoria" class="form-label">Categoría</label>
              <input type="text" id="equipoCategoria" class="form-control" placeholder="Primera División" required>
            </div>
            <div class="mb-3">
              <label for="equipoClub" class="form-label">Club</label>
              <select id="equipoClub" class="form-select" required>
                <option value="">Selecciona un club</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div th:replace="fragments/layout :: footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const equipoModal = new bootstrap.Modal(document.getElementById('equipoModal'));
    const equipoForm = document.getElementById('equipoForm');
    const equipoGrid = document.getElementById('equipo-grid');
    const selectClub = document.getElementById('equipoClub');
    const alertContainer = document.getElementById('alertContainer');
    const btnAddEquipo = document.getElementById('btnAddEquipo');

    document.addEventListener('DOMContentLoaded', () => {
      loadClubs();
      loadEquipos();
      btnAddEquipo.addEventListener('click', () => openEquipoModal());
      equipoForm.addEventListener('submit', saveEquipo);
    });

    async function loadClubs() {
      try {
        const response = await fetch('/api/clubes');
        const clubs = await response.json();
        selectClub.innerHTML = '<option value="">Selecciona un club</option>';
        clubs.forEach(club => {
          const option = document.createElement('option');
          option.value = club.id;
          option.textContent = club.nombre;
          selectClub.appendChild(option);
        });
      } catch (error) {
        showAlert('Error al cargar clubs. ' + error.message, 'danger');
      }
    }

    async function loadEquipos() {
      try {
        const response = await fetch('/api/equipos');
        const equipos = await response.json();
        renderEquipos(equipos);
      } catch (error) {
        showAlert('Error al cargar equipos. ' + error.message, 'danger');
      }
    }

    function renderEquipos(equipos) {
      equipoGrid.innerHTML = '';
      if (!Array.isArray(equipos) || equipos.length === 0) {
        equipoGrid.innerHTML = `
          <article class="item-card text-center">
            <div class="card-body">
              <h3>No hay equipos registrados</h3>
              <p>Agrega un equipo para comenzar a construir tu plantilla.</p>
            </div>
          </article>
        `;
        return;
      }

      equipos.forEach((equipo, index) => {
        const card = document.createElement('article');
        card.className = 'item-card';
        const initials = equipo.nombre ? equipo.nombre.charAt(0).toUpperCase() : 'E';
        card.innerHTML = `
          <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="avatar">${initials}</div>
            <span class="badge-pill">Equipo ${index + 1}</span>
          </div>
          <h3>${equipo.nombre || 'N/A'}</h3>
          <div class="meta">
            <span><strong>Categoría:</strong> ${equipo.categoria || 'Sin categoría'}</span>
            <span><strong>Club:</strong> ${equipo.club?.nombre || 'Sin club'}</span>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-sm btn-outline-light">Editar</button>
            <button type="button" class="btn btn-sm btn-outline-danger">Eliminar</button>
          </div>
        `;
        const buttons = card.querySelectorAll('button');
        buttons[0].addEventListener('click', () => openEquipoModal(equipo));
        buttons[1].addEventListener('click', () => deleteEquipo(equipo.id));
        equipoGrid.appendChild(card);
      });
    }

    function openEquipoModal(equipo = null) {
      document.getElementById('equipoId').value = equipo ? equipo.id : '';
      document.getElementById('equipoNombre').value = equipo ? equipo.nombre : '';
      document.getElementById('equipoCategoria').value = equipo ? equipo.categoria : '';
      document.getElementById('equipoClub').value = equipo?.club?.id || '';
      document.getElementById('equipoModalLabel').textContent = equipo ? 'Editar equipo' : 'Nuevo equipo';
      equipoModal.show();
    }

    async function saveEquipo(event) {
      event.preventDefault();
      const id = document.getElementById('equipoId').value;
      const payload = {
        nombre: document.getElementById('equipoNombre').value.trim(),
        categoria: document.getElementById('equipoCategoria').value.trim(),
        clubId: document.getElementById('equipoClub').value
      };

      try {
        const response = await fetch(id ? `/api/equipos/${id}` : '/api/equipos', {
          method: id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error('No se pudo guardar el equipo');
        }
        showAlert(`Equipo ${id ? 'actualizado' : 'creado'} correctamente.`);
        equipoModal.hide();
        loadEquipos();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    async function deleteEquipo(id) {
      if (!confirm('¿Seguro que quieres eliminar este equipo?')) return;
      try {
        const response = await fetch(`/api/equipos/${id}`, { method: 'DELETE' });
        if (!response.ok) {
          throw new Error('No se pudo eliminar el equipo');
        }
        showAlert('Equipo eliminado correctamente.', 'warning');
        loadEquipos();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    function showAlert(message, type = 'success') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
      `;
    }
  </script>
</body>
</html>
